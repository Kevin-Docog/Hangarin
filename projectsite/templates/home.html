{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="content">
<div class="container-fluid">
<h4 class="page-title">Home</h4>
<div class="row">
  <div class="col-md-3">
    <div class="card card-stats card-warning">
      <div class="card-body">
        <div class="row">
          <div class="col-5">
            <div class="icon-big text-center">
              <i class="la la-book"></i>
            </div>
          </div>
          <div class="col-7 d-flex align-items-center">
            <div class="numbers">
              <p class="card-category">Tasks</p>
              <h4 class="card-title">{{total_tasks}}</h4>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card card-stats card-success">
      <div class="card-body">
        <div class="row">
          <div class="col-5">
            <div class="icon-big text-center">
              <i class="la la-check-circle"></i>
            </div>
          </div>
          <div class="col-7 d-flex align-items-center">
            <div class="numbers">
              <p class="card-category">Tasks Completed This Year</p>
              <h4 class="card-title">{{tasks_completed_this_year}}</h4>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card card-stats card-danger">
      <div class="card-body">
        <div class="row">
          <div class="col-5">
            <div class="icon-big text-center">
              <i class="la la-newspaper-o"></i>
            </div>
          </div>
          <div class="col-7 d-flex align-items-center">
            <div class="numbers">
              <p class="card-category">Total Sub Tasks</p>
              <h4 class="card-title">{{total_subtasks}}</h4>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card card-stats card-primary">
      <div class="card-body">
        <div class="row">
          <div class="col-5">
            <div class="icon-big text-center">
              <i class="la la-pencil"></i>
            </div>
          </div>
          <div class="col-7 d-flex align-items-center">
            <div class="numbers">
              <p class="card-category">Total Notes</p>
              <h4 class="card-title">{{total_notes}}</h4>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="row">
<div class="col-md-12">
<div class="card">
<div class="card-header">
<div class="card-title">Page Title</div>
<div class="card-category">Page Subtitle</div>
</div>
<div class="card-body">Hello, World</div>
</div>
</div>
</div>
</div>
</div>
{% endblock %}
