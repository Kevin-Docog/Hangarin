{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Priority - Hangarin{% endblock %}

{% block content %}

<!-- Page Heading -->
<div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">Delete Priority</h1>
    <a href="{% url 'priority-list' %}" class="d-none d-sm-inline-block btn btn-sm btn-secondary shadow-sm">
        <i class="fas fa-arrow-left fa-sm text-white-50"></i> Back to Priorities
    </a>
</div>

<div class="row">
    <div class="col-lg-6">
        <div class="card shadow mb-4 border-left-danger">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-danger">
                    <i class="fas fa-exclamation-triangle mr-2"></i> Confirm Deletion
                </h6>
            </div>
            <div class="card-body">
                <div class="alert alert-warning" role="alert">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    Are you sure you want to delete "<strong>{{ object.name }}</strong>"?
                    <br><small class="text-muted">This action cannot be undone.</small>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex">
                        <button type="submit" class="btn btn-danger mr-2">
                            <i class="fas fa-trash mr-1"></i> Yes, Delete
                        </button>
                        <a href="{% url 'priority-list' %}" class="btn btn-secondary">
                            <i class="fas fa-times mr-1"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
